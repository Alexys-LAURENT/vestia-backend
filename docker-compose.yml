services:
  app:
    build: .
    ports:
      - '${PORT:-3333}:${PORT:-3333}'
    env_file: .env
    environment:
      HOST: 0.0.0.0
      DB_HOST: postgres
    volumes:
      - app_storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: ${DB_USER:-vestia}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-vestia}
      POSTGRES_DB: vestia
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-vestia}']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pg_data:
  app_storage:

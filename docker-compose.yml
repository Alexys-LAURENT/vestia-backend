services:
  app:
    build: .
    ports:
      - '${PORT:-3333}:3333'
    environment:
      TZ: UTC
      PORT: 3333
      HOST: 0.0.0.0
      NODE_ENV: production
      LOG_LEVEL: info
      APP_KEY: ${APP_KEY}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-vestia}
      DB_PASSWORD: ${DB_PASSWORD:-vestia}
      DB_DATABASE: ${DB_DATABASE:-vestia}
      DRIVE_DISK: fs
      DRIVE_FS_ROOT: storage
      DRIVE_ROUTE_BASE_PATH: /uploads
      MODEL_NAME_FOR_ANALYSIS: ${MODEL_NAME_FOR_ANALYSIS:-qwen3-vl:2b}
      GOOGLE_GENERATIVE_AI_API_KEY: ${GOOGLE_GENERATIVE_AI_API_KEY}
    volumes:
      - app_storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: ${DB_USER:-vestia}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-vestia}
      POSTGRES_DB: vestia
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-vestia}']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pg_data:
  app_storage:
